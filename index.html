<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="https://cdn-icons-png.freepik.com/256/13077/13077693.png?semt=ais_white_label" type="image/x-icon">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* 🌙 Dark */
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --primary: #ec4899;
  --hover: #db2777;
  --muted: #94a3b8;
}

/* ☀️ Light */
body.light {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --primary: #ec4899;
  --hover: #be185d;
  --muted: #64748b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  transition: 0.3s;
}

/* Card */
.container {
  width: 380px;
  padding: 25px;
  background: var(--card);
  border-radius: 15px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}

h2 {
  font-family: 'Playfair Display';
  margin-bottom: 15px;
}

/* Input */
.input-box {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--muted);
  background: transparent;
  color: var(--text);
}

/* Buttons */
button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: var(--hover);
  transform: scale(1.05);
}

/* Tasks */
ul {
  list-style: none;
  margin-top: 20px;
}

li {
  background: rgba(255,255,255,0.05);
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity:0; transform:translateX(-20px); }
  to { opacity:1; transform:translateX(0); }
}

body.light li {
  background: #f1f5f9;
}

li.done {
  text-decoration: line-through;
  opacity: 0.6;
}

/* Delete */
.delete {
  background: transparent;
  color: red;
}

/* Footer */
.footer {
  margin-top: 15px;
  font-size: 14px;
  color: var(--muted);
}

/* Filters */
.filters {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.filter-btn {
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 5px 10px;
}

/* Theme */
.theme-toggle {
  margin-bottom: 10px;
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
}
</style>
</head>

<body>

<div class="container">
  <button class="theme-toggle">🌑 Mode sombre</button>

  <h2>✨ Todo ✨</h2>

  <div class="input-box">
    <input id="taskInput" placeholder="Ajouter une tâche...">
    <button onclick="addTask()">➕</button>
  </div>

  <ul id="taskList"></ul>

  <div class="filters">
    <button class="filter-btn" onclick="filterTasks('all')">All</button>
    <button class="filter-btn" onclick="filterTasks('active')">Active</button>
    <button class="filter-btn" onclick="filterTasks('done')">Done</button>
  </div>

  <div class="footer">
    <span id="counter">0 tâches</span>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  let filtered = tasks.filter(t => {
    if (currentFilter === "active") return !t.done;
    if (currentFilter === "done") return t.done;
    return true;
  });

  filtered.forEach((task, index) => {
    const li = document.createElement("li");
    li.textContent = task.text;
    if (task.done) li.classList.add("done");

    li.onclick = () => {
      task.done = !task.done;
      save();
      render();
    };

    const del = document.createElement("button");
    del.textContent = "❌";
    del.className = "delete";

    del.onclick = (e) => {
      e.stopPropagation();
      tasks.splice(index, 1);
      save();
      render();
    };

    li.appendChild(del);
    list.appendChild(li);
  });

  document.getElementById("counter").textContent =
    tasks.length + " tâche(s)";
}

function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value.trim()) return;

  tasks.push({ text: input.value, done: false });
  input.value = "";
  save();
  render();
}

function filterTasks(type) {
  currentFilter = type;
  render();
}

// Theme
const btn = document.querySelector(".theme-toggle");

btn.onclick = () => {
  document.body.classList.toggle("light");

  btn.textContent = document.body.classList.contains("light")
    ? "☀️ Mode clair"
    : "🌑 Mode sombre";
};

render();
</script>

</body>
</html>
